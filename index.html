<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Atendimento - Rick and Morty</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Central de Atendimento Rick and Morty</h1>
        <p>O primeiro do multiverso a chegar é o primeiro a ser atendido!</p>
    </header>

    <main>
        <section class="controles">
            <button id="btn-adicionar">Chamar Novo Personagem</button>
            <button id="btn-atender" class="danger">Atender Próximo</button>
        </section>

        <section id="atendimento-atual">
            <p class="mensagem-vazia">Nenhum personagem está em atendimento no momento.</p>
        </section>

        <section class="container-fila">
            <h2>Sala de Espera: <span id="contador">0</span> personagens</h2>
            <div id="visualizacao-fila" class="fila-wrapper">
                <p class="mensagem-vazia">A sala de espera está vazia.</p>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
